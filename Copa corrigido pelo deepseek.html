        .logo p { color: #718096; }
        .user-info { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .user-name { font-weight: bold; color: #2d3748; }
        .admin-badge { background: #e53e3e; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .btn-sair { background: #e53e3e; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: #48bb78; color: white; }
        .btn-primary:hover { background: #38a169; transform: translateY(-2px); }
        .btn-success { background: #48bb78; color: white; width: 100%; margin-top: 20px; padding: 12px; font-size: 16px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #2d3748; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; }
        .grupo-section { margin-bottom: 30px; background: #f7fafc; border-radius: 12px; padding: 15px; }
        .grupo-titulo { background: #2d3748; color: white; padding: 10px 15px; border-radius: 10px; margin-bottom: 15px; font-size: 18px; font-weight: bold; }

        .jogo-palpite input { width: 70px; padding: 8px; text-align: center; border: 2px solid #cbd5e0; border-radius: 8px; font-size: 16px; }
        .btn-salvar-individual { background: #48bb78; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-salvar-individual:hover { background: #38a169; transform: scale(1.02); }
        .btn-salvar-individual:disabled { background: #a0aec0; cursor: not-allowed; transform: none; }
        .status-salvo { font-size: 12px; color: #276749; background: #c6f6d5; padding: 4px 8px; border-radius: 20px; display: inline-block; }
        .feedback-salvo { font-size: 11px; animation: fadeOut 1.5s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; display: none; } }
        .jogo-resultado { font-size: 12px; color: #718096; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e2e8f0; }
        .tabela-classificacao { overflow-x: auto; }
        .tabela-classificacao table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .tabela-classificacao th { background: #2d3748; color: white; padding: 12px; text-align: center; font-size: 14px; }
        .tabela-classificacao td { padding: 10px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .tabela-classificacao tr:hover { background: #f7fafc; }
        .ranking-item { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .ranking-pos { font-size: 20px; font-weight: bold; color: #48bb78; width: 50px; }
        .ranking-nome { flex: 1; font-weight: 500; }
        .ranking-pontos { font-size: 18px; font-weight: bold; color: #2d3748; }
        .mensagem { padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { background: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; }

                { id: 68, grupo: 'L', timeA: 'Gana',           timeB: 'Panamá',          fase: 'grupos', golsA: null, golsB: null, data: '17/06/2026', horario: '20:00', rodada: 1 },
                { id: 69, grupo: 'L', timeA: 'Inglaterra',     timeB: 'Gana',            fase: 'grupos', golsA: null, golsB: null, data: '23/06/2026', horario: '17:00', rodada: 2 },
                { id: 70, grupo: 'L', timeA: 'Panamá',         timeB: 'Croácia',         fase: 'grupos', golsA: null, golsB: null, data: '23/06/2026', horario: '20:00', rodada: 2 },
                { id: 71, grupo: 'L', timeA: 'Panamá',         timeB: 'Inglaterra',      fase: 'grupos', golsA: null, golsB: null, data: '27/06/2026', horario: '18:00', rodada: 3 },
                { id: 72, grupo: 'L', timeA: 'Croácia',        timeB: 'Gana',            fase: 'grupos', golsA: null, golsB: null, data: '27/06/2026', horario: '18:00', rodada: 3 },
            ];
        }

        let jogos = [];
        let usuarios = [];
        let usuarioLogado = null;

        // ==================== FUNÇÃO DE VERIFICAÇÃO DE BLOQUEIO POR HORÁRIO ====================
        function isJogoBloqueado(jogo) {
            if (!jogo || !jogo.data || !jogo.horario) return false;
            // Converte a string "DD/MM/AAAA HH:MM" para um objeto Date
            const partesData = jogo.data.split('/');
            if (partesData.length !== 3) return false;
            const dia = parseInt(partesData[0]);
            const mes = parseInt(partesData[1]) - 1; // Mês é 0-index
            const ano = parseInt(partesData[2]);
            const partesHora = jogo.horario.split(':');
            const hora = parseInt(partesHora[0]);
            const minuto = parseInt(partesHora[1]);
            const dataJogo = new Date(ano, mes, dia, hora, minuto);
            const agora = new Date();
            return agora >= dataJogo;
        }

        // ==================== FUNÇÕES DE PERSISTÊNCIA ====================
        function inicializarDados() {
            jogos = gerarJogosFaseGrupos();
            localStorage.setItem('copa2026_jogos', JSON.stringify(jogos));
            const adminUser = { id: 1, nome: "admin", senha: "admin123", isAdmin: true };
            usuarios = [adminUser];
            localStorage.setItem('copa2026_usuarios', JSON.stringify(usuarios));
        }
        
        function carregarDados() {
            const jogosSalvos = localStorage.getItem('copa2026_jogos');
            if (jogosSalvos) {
                jogos = JSON.parse(jogosSalvos);
            } else {
                inicializarDados();
            }
            const usuariosSalvos = localStorage.getItem('copa2026_usuarios');
            if (usuariosSalvos) {
                usuarios = JSON.parse(usuariosSalvos);
                const adminExiste = usuarios.find(u => u.nome === "admin");
                if (!adminExiste) {
                    usuarios.unshift({ id: 1, nome: "admin", senha: "admin123", isAdmin: true });
                    localStorage.setItem('copa2026_usuarios', JSON.stringify(usuarios));
                }
            } else {
                inicializarDados();
            }
            const sessaoSalva = localStorage.getItem('copa2026_sessao');
            if (sessaoSalva) {
                try {
                    const sessao = JSON.parse(sessaoSalva);
                    const usuarioEncontrado = usuarios.find(u => u.id === sessao.usuarioId);
                    if (usuarioEncontrado) usuarioLogado = usuarioEncontrado;
                } catch(e) {}
            }
        }

        function salvarUsuarios() { localStorage.setItem('copa2026_usuarios', JSON.stringify(usuarios)); }
        function salvarJogos() { localStorage.setItem('copa2026_jogos', JSON.stringify(jogos)); }
        function salvarSessao() {
            if (usuarioLogado) localStorage.setItem('copa2026_sessao', JSON.stringify({ usuarioId: usuarioLogado.id }));
            else localStorage.removeItem('copa2026_sessao');
        }

        // ==================== LÓGICA DE PONTUAÇÃO ====================
        function calcularPontosJogo(jogo, palpiteA, palpiteB) {
            if (jogo.golsA === null || jogo.golsB === null) return 0;
            if (palpiteA === '' || palpiteB === '') return 0;
            const pA = parseInt(palpiteA), pB = parseInt(palpiteB);
            const rA = jogo.golsA, rB = jogo.golsB;
            if (isNaN(pA) || isNaN(pB)) return 0;
            if (pA === rA && pB === rB) return 6;
            const empateReal = (rA === rB), empatePalpite = (pA === pB);
            if (empateReal && empatePalpite) return 1;
            if (!empateReal && !empatePalpite) {
                const ganhadorReal = rA > rB ? 'A' : 'B';
                const ganhadorPalpite = pA > pB ? 'A' : 'B';
                if (ganhadorReal === ganhadorPalpite) return 3;
            }
            return 0;
        }

        function calcularPontuacaoUsuario(usuario) {
            if (usuario.isAdmin) return 0;
            let pontos = 0;
            if (!usuario.palpites) return 0;
            for (const palpite of usuario.palpites) {
                const jogo = jogos.find(j => j.id === palpite.jogoId);
                if (jogo) pontos += calcularPontosJogo(jogo, palpite.palpiteA, palpite.palpiteB);
            }
            return pontos;
        }

        // ==================== CLASSIFICAÇÃO ====================
        function calcularClassificacaoGrupo(grupo) {
            const selecoes = gruposConfig[grupo];
            const tabela = {};
            selecoes.forEach(selecao => { tabela[selecao] = { P:0,J:0,V:0,E:0,D:0,GP:0,GC:0,SG:0 }; });
            const jogosGrupo = jogos.filter(j => j.grupo === grupo && j.golsA !== null && j.golsB !== null);
            jogosGrupo.forEach(jogo => {
                const timeA = jogo.timeA, timeB = jogo.timeB, golsA = jogo.golsA, golsB = jogo.golsB;
                tabela[timeA].J++; tabela[timeB].J++;
                tabela[timeA].GP += golsA; tabela[timeA].GC += golsB;
                tabela[timeB].GP += golsB; tabela[timeB].GC += golsA;
                if (golsA > golsB) { tabela[timeA].V++; tabela[timeA].P += 3; tabela[timeB].D++; }
                else if (golsA < golsB) { tabela[timeB].V++; tabela[timeB].P += 3; tabela[timeA].D++; }
                else { tabela[timeA].E++; tabela[timeA].P += 1; tabela[timeB].E++; tabela[timeB].P += 1; }
            });
            Object.keys(tabela).forEach(selecao => { tabela[selecao].SG = tabela[selecao].GP - tabela[selecao].GC; });
            return Object.entries(tabela).map(([nome, dados]) => ({ nome, ...dados })).sort((a,b) => {
                if (a.P !== b.P) return b.P - a.P;
                if (a.SG !== b.SG) return b.SG - a.SG;
                return b.GP - a.GP;
            });
        }

        // ==================== PALPITES ====================
        function inicializarPalpites(usuario) {
            if (!usuario.isAdmin && (!usuario.palpites || usuario.palpites.length !== jogos.length)) {
                usuario.palpites = jogos.map(jogo => ({ jogoId: jogo.id, palpiteA: '', palpiteB: '' }));
                salvarUsuarios();
            }
        }

        function salvarPalpite(usuario, jogoId, palpiteA, palpiteB) {
            if (usuario.isAdmin) return false;
            const jogo = jogos.find(j => j.id === jogoId);
            if (jogo && isJogoBloqueado(jogo)) {
                alert("⛔ Este jogo já começou ou já passou! Não é mais possível alterar o palpite.");
                return false;
            }
            if (!usuario.palpites) inicializarPalpites(usuario);
            const palpite = usuario.palpites.find(p => p.jogoId === jogoId);
            if (palpite) {
                palpite.palpiteA = palpiteA;
                palpite.palpiteB = palpiteB;
                salvarUsuarios();
                return true;
            }
            return false;
        }

        // ==================== USUÁRIOS ====================
        function cadastrarUsuario(nome, senha) {
            if (usuarios.find(u => u.nome === nome)) return { sucesso: false, mensagem: 'Nome de usuário já existe!' };
            if (nome.length < 3) return { sucesso: false, mensagem: 'Nome deve ter pelo menos 3 caracteres!' };
            if (senha.length < 4) return { sucesso: false, mensagem: 'Senha deve ter pelo menos 4 caracteres!' };
            const novoUsuario = { id: Date.now(), nome, senha, isAdmin: false, palpites: jogos.map(j => ({ jogoId: j.id, palpiteA: '', palpiteB: '' })) };
            usuarios.push(novoUsuario);
            salvarUsuarios();
            return { sucesso: true, mensagem: 'Cadastro realizado com sucesso!' };
        }
        
        function fazerLogin(nome, senha) {
            const usuario = usuarios.find(u => u.nome === nome && u.senha === senha);
            if (usuario) { usuarioLogado = usuario; salvarSessao(); return { sucesso: true, mensagem: 'Login realizado com sucesso!' }; }
            return { sucesso: false, mensagem: 'Usuário ou senha inválidos!\n\nAdmin: admin / admin123' };
        }
        
        function fazerLogout() { usuarioLogado = null; salvarSessao(); renderizar(); }
        
        // ==================== RESULTADOS REAIS ====================
        function atualizarResultadoReal(jogoId, golsA, golsB) {
            if (!usuarioLogado?.isAdmin) { alert("Apenas o administrador pode atualizar os resultados reais!"); return false; }
            const jogo = jogos.find(j => j.id === jogoId);
            if (jogo) { jogo.golsA = golsA === '' ? null : parseInt(golsA); jogo.golsB = golsB === '' ? null : parseInt(golsB); salvarJogos(); return true; }
            return false;
        }
        
        // ==================== RANKING ====================
        function obterRanking() {
            const usuariosComuns = usuarios.filter(u => !u.isAdmin);
            const ranking = usuariosComuns.map(u => ({ nome: u.nome, pontos: calcularPontuacaoUsuario(u) }));
            ranking.sort((a,b) => b.pontos - a.pontos);
            return ranking;
        }
        
        // ==================== RENDERIZAÇÃO ====================
        function renderizar() {
            const app = document.getElementById('app');
            if (!usuarioLogado) {

        }

        // ==================== RENDERIZAÇÃO DA ABA PALPITES COM TRAVA ====================
        function renderizarPalpites() {

            let html = '<div class="card"><h2>📝 Registre seus palpites</h2><div class="aviso-admin" style="background:#e8f0fe; border-left-color:#4299e1;">⚽ Os jogos estão organizados por grupo. Palpite com cuidado! Jogos que já começaram ou passaram ficam bloqueados.</div>';

        function renderizarClassificacaoGrupos() {

                });
                html += `</tbody></table></div></div>`;
            }
            html += `</div>`;

        }
        
        function renderizarRankingPalpites() {
            const ranking = obterRanking();

            if (voltarLogin) voltarLogin.onclick = () => { formLogin.style.display='block'; formCadastro.style.display='none'; mensagemDiv.className='mensagem'; };

        function adicionarEventosSistema() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.onclick = () => {
                    const tabId = tab.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('ativo'));
                    tab.classList.add('ativo');
                    document.getElementById(`tab-${tabId}`).classList.add('ativo');
                };
            });
            const btnSair = document.getElementById('btnSair');
            if (btnSair) btnSair.onclick = () => fazerLogout();
            
            if (usuarioLogado && !usuarioLogado.isAdmin) {
                document.querySelectorAll('.btn-salvar-individual').forEach(btn => {
                    if (btn.disabled) return; // se já estiver desabilitado pelo bloqueio, não adiciona evento
                    btn.onclick = (e) => {
                        const jogoId = parseInt(btn.dataset.jogo);
                        const jogo = jogos.find(j => j.id === jogoId);
                        if (jogo && isJogoBloqueado(jogo)) {
                            alert("⛔ Este jogo já começou! Não é mais possível alterar o palpite.");
                            return;
                        }
                        const inputA = document.querySelector(`.palpiteA-${jogoId}`);
                        const inputB = document.querySelector(`.palpiteB-${jogoId}`);
                        let palpiteA = inputA.value.trim() === '' ? '' : parseInt(inputA.value);
                        let palpiteB = inputB.value.trim() === '' ? '' : parseInt(inputB.value);
                        if (palpiteA !== '' && (isNaN(palpiteA) || palpiteA < 0)) { alert('Número inválido para o primeiro time'); return; }
                        if (palpiteB !== '' && (isNaN(palpiteB) || palpiteB < 0)) { alert('Número inválido para o segundo time'); return; }
                        salvarPalpite(usuarioLogado, jogoId, palpiteA, palpiteB);
                        const statusSpan = document.getElementById(`status-${jogoId}`);
                        const feedbackSpan = document.getElementById(`feedback-${jogoId}`);
                        if (palpiteA !== '' && palpiteB !== '') {
                            statusSpan.style.display = 'inline-block';
                            statusSpan.textContent = '✔ salvo';
                            feedbackSpan.textContent = '✓ Palpite salvo!';
                            feedbackSpan.style.color = '#276749';
                        } else {
                            statusSpan.style.display = 'none';
                            feedbackSpan.textContent = '⚠️ Palpite removido';
                            feedbackSpan.style.color = '#c53030';
                        }
                        feedbackSpan.style.display = 'inline-block';
                        setTimeout(() => feedbackSpan.style.display = 'none', 2000);
                        btn.style.backgroundColor = '#38a169';
                        setTimeout(() => btn.style.backgroundColor = '#48bb78', 200);
                    };
                });
            }
            const btnResultados = document.getElementById('salvarResultados');
            if (btnResultados && usuarioLogado?.isAdmin) btnResultados.onclick = () => {
                jogos.forEach(jogo => {
                    const inputA = document.getElementById(`resultA_${jogo.id}`);
                    const inputB = document.getElementById(`resultB_${jogo.id}`);
                    if (inputA && inputB) atualizarResultadoReal(jogo.id, inputA.value, inputB.value);
                });
                alert('Resultados salvos! Classificação e ranking atualizados.');
                renderizar();
            };
        }
        
        // ==================== INICIALIZAÇÃO ====================
        try {
            carregarDados();
            renderizar();
        } catch(e) {
            console.error(e);
            document.getElementById('app').innerHTML = `<div style="color:white;padding:40px;">❌ Erro: ${e.message}<br><button onclick="localStorage.clear();location.reload()">Resetar</button></div>`;
        }
    </script>
</body>
</html>
